name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    concurrency:
      group: deploy-api-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Sync code to live directory
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'apps/api/.env' \
            --exclude '.secrets' \
            ./ /home/samora/deploy/kitabu-live/
      - name: Deploy on Hetzner
        run: |
          set -euo pipefail
          cd /home/samora/deploy/kitabu-live
          docker compose up -d --build postgres redis api worker caddy
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4000/health >/dev/null; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs api --tail=120
          exit 1
